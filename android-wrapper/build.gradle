apply plugin: 'com.android.library'

android {
    namespace 'com.rfx.compressor'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34

        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64', 'x86'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }

    sourceSets {
        main {
            // Point to the jniLibs directory where cargo-ndk outputs .so files
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }
}
