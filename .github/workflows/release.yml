name: Build and Release Android .so Libraries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Cross-compile for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android,
            i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build for all Android architectures
        run: |
          cargo ndk \
            -t arm64-v8a \
            -t armeabi-v7a \
            -t x86_64 \
            -t x86 \
            -o ./jniLibs \
            build --release

      - name: Package jniLibs
        run: tar -czf native-screen-compressor-jniLibs.tar.gz -C jniLibs .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jniLibs
          path: jniLibs/
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: native-screen-compressor-jniLibs.tar.gz
          generate_release_notes: true
